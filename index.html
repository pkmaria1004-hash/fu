<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키오스크 해석기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --bg: #f7f6f2;
    --card: #ffffff;
    --blue: #2563eb;
    --blue-light: #eff6ff;
    --blue-border: #bfdbfe;
    --green-light: #f0fdf4;
    --green-border: #bbf7d0;
    --green-text: #15803d;
    --amber-light: #fffbeb;
    --amber-border: #fde68a;
    --amber-text: #92400e;
    --red-light: #fef2f2;
    --red-border: #fecaca;
    --red-text: #dc2626;
    --muted: #6b7280;
    --border: #e5e7eb;
    --radius: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: #111;
    min-height: 100vh;
    padding: 28px 16px 60px;
    max-width: 520px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  .badge {
    display: inline-block;
    background: var(--blue);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  header p { font-size: 15px; color: var(--muted); line-height: 1.6; }

  #uploadCard {
    background: var(--card);
    border: 2.5px dashed var(--blue-border);
    border-radius: var(--radius);
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
  }
  #uploadCard:hover { background: var(--blue-light); border-color: var(--blue); }
  #uploadCard .emoji { font-size: 52px; display: block; margin-bottom: 16px; }
  #uploadCard h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  #uploadCard p { font-size: 15px; color: var(--muted); }

  #previewImg {
    width: 100%; max-height: 300px; object-fit: contain;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: #fff; display: none; margin-bottom: 14px;
  }

  #loadBox {
    display: none; text-align: center;
    background: var(--card); border-radius: var(--radius);
    padding: 40px 24px; margin-bottom: 20px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--blue-border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadBox h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  #loadBox p { font-size: 14px; color: var(--muted); }

  #resultBox { display: none; }

  .res-title {
    font-size: 22px; font-weight: 700;
    text-align: center; margin-bottom: 16px;
  }

  .card {
    border-radius: var(--radius); padding: 20px;
    margin-bottom: 14px; border: 1.5px solid;
  }
  .card.blue { background: var(--blue-light); border-color: var(--blue-border); }
  .card.green { background: var(--green-light); border-color: var(--green-border); }
  .card.plain { background: var(--card); border-color: var(--border); }

  .card-label {
    font-size: 13px; font-weight: 700;
    margin-bottom: 12px; display: flex;
    align-items: center; gap: 6px;
  }
  .card-label.blue { color: var(--blue); }
  .card-label.green { color: var(--green-text); }

  #rMain { font-size: 16px; line-height: 1.8; font-weight: 500; }

  .step {
    display: flex; gap: 14px;
    align-items: flex-start;
    margin-bottom: 14px; font-size: 15px; line-height: 1.6;
  }
  .step:last-child { margin-bottom: 0; }
  .step-n {
    min-width: 34px; height: 34px; border-radius: 50%;
    background: var(--blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; flex-shrink: 0;
  }

  .tips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 12px;
    font-size: 14px; line-height: 1.5;
  }
  .tip span { font-size: 24px; display: block; margin-bottom: 8px; }

  #warnBox {
    background: var(--amber-light);
    border: 1.5px solid var(--amber-border);
    border-radius: var(--radius);
    padding: 16px 20px; font-size: 15px;
    line-height: 1.7; color: var(--amber-text);
    font-weight: 500; margin-bottom: 14px;
    display: none;
  }

  #errBox {
    background: var(--red-light);
    border: 1.5px solid var(--red-border);
    border-radius: var(--radius);
    padding: 16px 20px; font-size: 14px;
    line-height: 1.7; color: var(--red-text);
    margin-bottom: 14px; display: none;
  }

  .btn-row { display: flex; gap: 12px; margin-top: 8px; }
  .btn {
    flex: 1; padding: 16px;
    border-radius: var(--radius);
    font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-out { background: #fff; color: var(--blue); border: 2px solid var(--blue); }
  .btn-out:hover { background: var(--blue-light); }
  .btn-fill { background: var(--blue); color: #fff; border: 2px solid var(--blue); }
  .btn-fill:hover { background: #1d4ed8; }

  .reset-btn {
    display: block; width: 100%;
    padding: 13px; margin-top: 10px;
    border-radius: var(--radius);
    font-size: 14px; color: var(--muted);
    background: #fff; border: 1px solid var(--border);
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }
  .reset-btn:hover { background: var(--bg); }
</style>
</head>
<body>

<header>
  <div class="badge">고령층 맞춤 서비스</div>
  <h1>☕ 키오스크 해석기</h1>
  <p>키오스크 화면을 찍어서 올리면<br>쉽게 설명해드려요</p>
</header>

<div id="uploadCard" onclick="document.getElementById('fi').click()">
  <span class="emoji">📷</span>
  <h2>사진을 올려주세요</h2>
  <p>키오스크 화면 사진<br>(JPG, PNG)</p>
  <input type="file" id="fi" accept="image/*" style="display:none" onchange="onFile(event)">
</div>

<div id="errBox"></div>
<img id="previewImg">

<div id="loadBox">
  <div class="spinner"></div>
  <h3>분석 중이에요...</h3>
  <p>잠깐만 기다려 주세요</p>
</div>

<div id="resultBox">
  <div class="res-title" id="rTitle"></div>

  <div class="card blue">
    <div class="card-label blue">📋 이 화면은 무엇인가요?</div>
    <p id="rMain"></p>
  </div>

  <div class="card green">
    <div class="card-label green">✅ 이렇게 하세요 (순서대로)</div>
    <div id="rSteps"></div>
  </div>

  <div class="card plain">
    <div class="card-label">💡 도움말</div>
    <div class="tips-grid" id="rTips"></div>
  </div>

  <div id="warnBox"></div>

  <div class="btn-row">
    <button class="btn btn-out" onclick="resetAll()">다른 사진 보기</button>
    <button class="btn btn-fill" onclick="shareResult()">결과 공유하기</button>
  </div>
</div>

<script>
function onFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  hide('errBox'); hide('resultBox');

  const mediaType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const b64 = compress(img, 1024);
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('previewImg').style.display = 'block';
      hide('uploadCard');
      analyze(b64, mediaType);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function compress(img, maxPx) {
  const c = document.createElement('canvas');
  let w = img.width, h = img.height;
  if (w > maxPx || h > maxPx) {
    if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
    else { w = Math.round(w * maxPx / h); h = maxPx; }
  }
  c.width = w; c.height = h;
  c.getContext('2d').drawImage(img, 0, 0, w, h);
  return c.toDataURL('image/jpeg', 0.8).split(',')[1];
}

async function analyze(b64, mediaType) {
  show('loadBox'); hide('resultBox'); hide('errBox');
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: b64, mediaType })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '오류 발생');
    render(data);
  } catch (err) {
    showErr('오류: ' + err.message);
  }
  hide('loadBox');
}

function render(d) {
  document.getElementById('rTitle').textContent = d.title || '';
  document.getElementById('rMain').textContent = d.main || '';

  document.getElementById('rSteps').innerHTML = (d.steps || []).map((s, i) =>
    `<div class="step"><div class="step-n">${i+1}</div><div>${s}</div></div>`
  ).join('');

  const emojis = ['💡', '👆', '⚠️'];
  document.getElementById('rTips').innerHTML = (d.tips || []).map((t, i) =>
    `<div class="tip"><span>${emojis[i] || '💬'}</span>${t}</div>`
  ).join('');

  const w = document.getElementById('warnBox');
  if (d.warning) { w.textContent = '⚠️ 주의: ' + d.warning; w.style.display = 'block'; }
  else { w.style.display = 'none'; }

  show('resultBox');
}

function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = '❌ ' + msg; el.style.display = 'block';
  hide('loadBox');
}

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function resetAll() {
  document.getElementById('fi').value = '';
  document.getElementById('previewImg').style.display = 'none';
  hide('resultBox'); hide('errBox'); hide('loadBox');
  show('uploadCard');
}

function shareResult() {
  if (navigator.share) {
    navigator.share({ title: '키오스크 해석기', url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert('링크가 복사됐어요!');
  }
}
</script>
</body>
</html>
